name: linter.yml
on: push

jobs:
  linter-try:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true

      - name: Afficher le contenu du dossier
        run: ls -la

      - name: Executer le test
            # Complétez la commande pour afficher le contenu de message.txt
        run: node test.js
